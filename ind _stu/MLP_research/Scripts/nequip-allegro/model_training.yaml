  num_layers: 2
  num_scalar_features: 64
  num_tensor_features: 16
  allegro_mlp_hidden_layers_depth: 3
  allegro_mlp_hidden_layers_width: 256
  allegro_mlp_nonlinearity: silu
  parity: true
  tp_path_channel_coupling: true
