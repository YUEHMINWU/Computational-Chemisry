  _target_: nequip.train.EnergyForceMetrics
  coeffs:
    total_energy_rmse: 1.0
    forces_rmse: 1.0
    total_energy_mae: 1.0
    forces_mae: 1.0
test_metrics: null
num_datasets:
  train: 1
  val: 1
  test: 0
  predict: 0
info_dict:
  versions:
    torch: 2.9.0
    e3nn: 0.5.8
    nequip: 0.15.0
    allegro: 0.7.1
  data:
    _target_: nequip.data.datamodule.ASEDataModule
    seed: 677167
    split_dataset:
      file_path: /mnt/home/nuser08/ind_stu/litfsi_wis_20m/main/aimd_trajectory_primary_train_val.extxyz
      train: 960
      val: 240
    transforms:
    - _target_: nequip.data.transforms.ChemicalSpeciesToAtomTypeMapper
