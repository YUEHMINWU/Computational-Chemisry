model:
  _target_: nequip.model.ModelFromCheckpoint
  checkpoint_path: /mnt/home/nuser08/ind_stu/litfsi_wis_20m/main/lightning_logs/ver_298k_398k_498k_nvt_20ps/checkpoints/best.ckpt
  compile_mode: eager
optimizer:
  _target_: torch.optim.Adam
  lr: 0.001
lr_scheduler:
  scheduler:
    _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
    factor: 0.8
    patience: 10
    min_lr: 1.0e-05
  monitor: val0_epoch/weighted_sum
  interval: epoch
  frequency: 1
loss:
  _target_: nequip.train.EnergyForceLoss
  per_atom_energy: true
  coeffs:
    total_energy: 1.0
    forces: 1.0
train_metrics: null
val_metrics:
  _target_: nequip.train.EnergyForceMetrics
  coeffs:
    total_energy_rmse: 1.0
    forces_rmse: 1.0
    total_energy_mae: 1.0
    forces_mae: 1.0
test_metrics: null
num_datasets:
  train: 1
  val: 1
  test: 0
  predict: 0
info_dict:
  versions:
    torch: 2.9.0
    e3nn: 0.5.8
    nequip: 0.15.0
    allegro: 0.7.1
  data:
    _target_: nequip.data.datamodule.ASEDataModule
    seed: 677167
    split_dataset:
      file_path: /mnt/home/nuser08/ind_stu/litfsi_wis_20m/main/aimd_trajectory_primary_train_val_aug01.extxyz
      train: 992
      val: 248
    transforms:
    - _target_: nequip.data.transforms.ChemicalSpeciesToAtomTypeMapper
      chemical_symbols:
      - Li
      - F
      - S
      - O
      - C
      - 'N'
      - H
    - _target_: nequip.data.transforms.NeighborListTransform
      r_max: 6.0
    train_dataloader:
      _target_: torch.utils.data.DataLoader
      batch_size: 1
      shuffle: true
      num_workers: 5
    val_dataloader:
      _target_: torch.utils.data.DataLoader
      batch_size: 2
      num_workers: 5
      persistent_workers: true
    stats_manager:
      _target_: nequip.data.CommonDataStatisticsManager
      type_names:
      - Li
      - F
      - S
      - O
      - C
      - 'N'
      - H
  trainer:
    _target_: lightning.Trainer
    accelerator: gpu
    devices: auto
    max_epochs: 1000
    check_val_every_n_epoch: 1
    log_every_n_steps: 1000
    enable_progress_bar: false
    callbacks:
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: val0_epoch/weighted_sum
      patience: 20
      min_delta: 0.001
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      monitor: val0_epoch/weighted_sum
      filename: best
      save_last: true
  global_options:
    allow_tf32: false
  runs:
  - train
  training_module:
    _target_: nequip.train.EMALightningModule
    ema_decay: 0.999
    loss:
      _target_: nequip.train.EnergyForceLoss
      per_atom_energy: true
      coeffs:
        total_energy: 1.0
        forces: 1.0
    val_metrics:
      _target_: nequip.train.EnergyForceMetrics
      coeffs:
        total_energy_rmse: 1.0
        forces_rmse: 1.0
        total_energy_mae: 1.0
        forces_mae: 1.0
    optimizer:
      _target_: torch.optim.Adam
      lr: 0.001
    lr_scheduler:
      scheduler:
        _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
        factor: 0.8
        patience: 10
        min_lr: 1.0e-05
      monitor: val0_epoch/weighted_sum
      interval: epoch
      frequency: 1
    model:
      _target_: nequip.model.ModelFromCheckpoint
      checkpoint_path: /mnt/home/nuser08/ind_stu/litfsi_wis_20m/main/lightning_logs/ver_298k_398k_498k_nvt_20ps/checkpoints/best.ckpt
      compile_mode: eager
ema_decay: 0.999
